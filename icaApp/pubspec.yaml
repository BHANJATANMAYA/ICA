name: ica_app
description: "Indian Chess Academy — Parent & Student Portal"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  get: ^4.7.3

  # Backend
  supabase_flutter: ^2.14.2

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.1

  # --- Round 2 additions ---

  # MODULE 1: Local SQL Cache (drift)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # MODULE 2: Push Notifications (FCM)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # MODULE 3: Geolocation
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2

  # MODULE 4: Biometric Auth
  local_auth: ^2.3.0

  # MODULE 5: Security
  dio: ^5.7.0
  flutter_jailbreak_detection: ^1.9.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

  # MODULE 1: drift code generation
  drift_dev: ^2.18.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#1A3C5E"
    theme_color: "#1A3C5E"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 48
